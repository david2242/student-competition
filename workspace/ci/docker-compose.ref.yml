services:
  postgres-ref:
    image: postgres:16
    environment:
      POSTGRES_USER: "${SQL_SERVER_USERNAME}"
      POSTGRES_PASSWORD: "${SQL_SERVER_PASSWORD}"
      POSTGRES_DB: "${SQL_DATABASE_NAME}"
    networks:
      - ref_network
    volumes:
      - postgres-ref-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend-ref:
    image: ghcr.io/david2242/student-competition:ref
    environment:
      SWAGGER: "True"
      SQL_SERVER_HOST: "postgres-ref"
      SQL_SERVER_USERNAME: "${SQL_SERVER_USERNAME}"
      SQL_SERVER_PASSWORD: "${SQL_SERVER_PASSWORD}"
      SQL_DATABASE_NAME: "${SQL_DATABASE_NAME}"
      SQL_SERVER_PORT: "${SQL_SERVER_PORT:-5432}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD}"
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on:
      - postgres-ref
    networks:
      - ref_network
    ports:
      - "8081:8080"
    restart: unless-stopped

networks:
  ref_network:

volumes:
  postgres-ref-data:
    driver: local

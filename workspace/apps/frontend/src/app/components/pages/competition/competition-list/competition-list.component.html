<div class="container">
  <div class="d-flex justify-content-between align-items-center mt-3 mb-1">
    <h5 class="mb-0">Versenyek</h5>
    <a *ngIf="(authService.$currentUser | async)?.role !== 'viewer'"
       routerLink="/competition-editor"
       class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg me-1"></i>Új verseny
    </a>
  </div>

  <app-competition-search-panel
    (searchSubmit)="onSearch($event)"
    (resetFilters)="onReset()"
  />

  <div class="d-flex align-items-center gap-2 mb-2">
    <label class="form-label mb-0 fw-semibold">Tanév:</label>
    <select class="form-select form-select-sm w-auto"
            [(ngModel)]="selectedSchoolYear"
            (ngModelChange)="onSchoolYearChange()">
      <option *ngFor="let year of availableSchoolYears" [ngValue]="year">
        {{ formatSchoolYear(year) }}
      </option>
    </select>
  </div>

  <div *ngIf="hasActiveFilters" class="mb-2 d-flex align-items-center gap-2">
    <span class="badge bg-info text-dark">
      <i class="bi bi-funnel-fill me-1"></i>Szűrők aktívak ({{ rowData?.length ?? 0 }} találat)
    </span>
    <button type="button" class="btn btn-link btn-sm p-0 text-secondary" (click)="onReset()">Szűrők törlése</button>
  </div>

  <ag-grid-angular
    class="ag-theme-alpine mt-3"
    domLayout="autoHeight"
    [rowData]="rowData"
    [columnDefs]="colDefs"
    [autoSizeStrategy]="autoSizeStrategy"
    (rowClicked)="goToCompetition($event)"
    [defaultColDef]="defaultColDef"
    [getRowClass]="getRowClass"
  />
</div>

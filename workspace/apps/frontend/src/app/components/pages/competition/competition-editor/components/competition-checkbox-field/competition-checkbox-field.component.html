<div class="form-check">
    <input class="form-check-input" type="checkbox" [id]="id" [formControl]="control"
        [attr.disabled]="displayMode === 'show' ? true : null" (click)="onToggle($any($event.target).checked)">
    <label class="form-check-label" [for]="id">
        {{ label }}
    </label>
</div>

<div [formGroup]="formGroup" class="row">
    <div class="col-md-6 mb-3">
        <label for="position" class="form-label">Helyezés</label>
        <div class="input-group">
            <input [readonly]="displayMode === 'show'" type="number" class="form-control" [ngClass]="{
          'is-invalid': displayMode === 'edit' && position.invalid && (position.touched || position.dirty),
          'is-valid': displayMode === 'edit' && position.touched && position.valid
        }" id="position" formControlName="position" min="1">
            <span class="input-group-text">. helyezés</span>
            @if (displayMode === 'edit' && position.invalid && (position.touched || position.dirty)) {
            <div class="invalid-feedback">Kérem adjon meg egy érvényes helyezést</div>
            }
        </div>
        <div class="form-text">Hagyja üresen, ha nincs helyezés</div>
    </div>
    <div class="col-md-6 mb-3">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="specialPrize" formControlName="specialPrize"
                [attr.disabled]="displayMode === 'show' ? true : null">
            <label class="form-check-label" for="specialPrize">Különdíj</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="compliment" formControlName="compliment"
                [attr.disabled]="displayMode === 'show' ? true : null">
            <label class="form-check-label" for="compliment">Dicséret</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="nextRound" formControlName="nextRound"
                [attr.disabled]="displayMode === 'show' ? true : null">
            <label class="form-check-label" for="nextRound">Továbbjutás</label>
        </div>
    </div>
</div>

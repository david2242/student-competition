name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: ["feature/**"]

jobs:
  test-backend:
    name: Backend Tests (NUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore workspace/apps/backend-test/Workspace.Backend.Test.csproj

      - name: Test
        run: dotnet test workspace/apps/backend-test/Workspace.Backend.Test.csproj --no-restore --verbosity normal

  test-frontend:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: workspace/package-lock.json

      - name: Install dependencies
        run: cd workspace && npm ci

      - name: Test
        run: cd workspace && npx nx test frontend --ci
